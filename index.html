<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión Operativa — Planta Biodiesel</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a18;padding:1.5rem}
.header{margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.header h1{font-size:18px;font-weight:500}
.header p{font-size:13px;color:#5f5e5a;margin-top:3px}
.sync{font-size:11px;padding:4px 10px;border-radius:99px;border:1px solid #d3d1c7;background:#fff;color:#5f5e5a;display:flex;align-items:center;gap:5px}
.sync.ok{border-color:#3B6D11;color:#27500A;background:#EAF3DE}
.sync.err{border-color:#A32D2D;color:#791F1F;background:#FCEBEB}
.sync.loading{border-color:#854F0B;color:#633806;background:#FAEEDA}
.nav{display:flex;gap:2px;margin-bottom:1.5rem;border-bottom:1px solid #e0dfd8;flex-wrap:wrap}
.nb{padding:8px 16px;font-size:13px;cursor:pointer;border:none;background:none;color:#5f5e5a;border-bottom:2px solid transparent;margin-bottom:-1px;display:flex;align-items:center;gap:6px}
.nb.on{color:#1a1a18;border-bottom:2px solid #1a1a18;font-weight:500}
.view{display:none}.view.on{display:block}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.fg-full{grid-column:1/-1}
.fl{display:flex;flex-direction:column;gap:5px}
label{font-size:12px;color:#5f5e5a}
input,select,textarea{font-family:inherit;font-size:13px;padding:7px 10px;border:1px solid #d3d1c7;border-radius:8px;background:#fff;color:#1a1a18;width:100%;outline:none}
input:focus,select:focus,textarea:focus{border-color:#888780}
textarea{resize:vertical;min-height:70px}
.sem{display:flex;gap:8px}
.sb{flex:1;padding:7px;border-radius:8px;border:1px solid #d3d1c7;background:#f5f5f3;cursor:pointer;font-size:12px;font-weight:500;color:#5f5e5a}
.sb.r.on{background:#FCEBEB;border-color:#A32D2D;color:#791F1F}
.sb.a.on{background:#FAEEDA;border-color:#854F0B;color:#633806}
.sb.v.on{background:#EAF3DE;border-color:#3B6D11;color:#27500A}
.save-btn{width:100%;padding:9px;font-size:13px;font-weight:500;cursor:pointer;border-radius:8px;background:#1a1a18;color:#fff;border:none;margin-top:4px}
.save-btn:hover{opacity:0.85}
.save-btn:disabled{opacity:0.5;cursor:not-allowed}
.msg{text-align:center;font-size:12px;margin-top:6px;min-height:16px}
.kstats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.2rem}
.ksc{background:#fff;border:1px solid #e0dfd8;border-radius:8px;padding:10px 12px}
.ksl{font-size:11px;color:#5f5e5a;margin-bottom:3px}
.ksv{font-size:22px;font-weight:500}
.kanban{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.kcol{background:#f1efe8;border-radius:12px;padding:10px}
.kctitle{font-size:11px;font-weight:500;color:#5f5e5a;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.kccnt{font-size:10px;background:#fff;border:1px solid #e0dfd8;border-radius:99px;padding:1px 6px}
.kcard{background:#fff;border:1px solid #e0dfd8;border-radius:8px;padding:9px;margin-bottom:6px;cursor:pointer;transition:border-color 0.15s}
.kcard:hover{border-color:#888780}
.kcard-area{font-size:10px;color:#5f5e5a;margin-bottom:3px}
.kcard-desc{font-size:12px;color:#1a1a18;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:5px}
.kcard-tags{display:flex;gap:3px;flex-wrap:wrap;align-items:center}
.kcard-edit{font-size:10px;color:#888780;margin-left:auto;display:flex;align-items:center;gap:2px}
.badge{font-size:10px;padding:2px 6px;border-radius:99px;font-weight:500;white-space:nowrap}
.br{background:#FCEBEB;color:#791F1F}
.ba{background:#FAEEDA;color:#633806}
.bv{background:#EAF3DE;color:#27500A}
.bg{background:#f1efe8;color:#5f5e5a;border:1px solid #d3d1c7}
.bb{background:#E6F1FB;color:#0C447C}
.bp{background:#EEEDFE;color:#3C3489}
.frow{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.frow select{font-size:12px;padding:5px 8px;width:auto}
.exp-btn{margin-left:auto;padding:6px 12px;font-size:12px;border-radius:8px;border:1px solid #d3d1c7;cursor:pointer;background:#f1efe8;color:#1a1a18;display:flex;align-items:center;gap:5px}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
th{font-size:11px;font-weight:500;color:#5f5e5a;padding:6px 8px;border-bottom:1px solid #e0dfd8;text-align:left;background:#fff}
td{padding:7px 8px;border-bottom:1px solid #e0dfd8;color:#1a1a18;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;background:#fff}
tr:hover td{background:#f5f5f3}
.tbl-edit{padding:3px 8px;font-size:11px;border-radius:8px;border:1px solid #d3d1c7;cursor:pointer;background:#f1efe8;color:#1a1a18;white-space:nowrap}
.empty{text-align:center;padding:2rem;color:#5f5e5a;font-size:13px}
.acard{background:#fff;border:1px solid #e0dfd8;border-radius:12px;padding:12px 14px;margin-bottom:8px}
.acard-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.acard-desc{font-size:13px;color:#1a1a18;line-height:1.4;margin-bottom:6px}
.acard-accion{font-size:12px;color:#5f5e5a;font-style:italic;padding-top:6px;border-top:1px solid #e0dfd8;margin-top:4px}
.abtns{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.abtn{padding:5px 12px;font-size:12px;border-radius:8px;border:1px solid #d3d1c7;cursor:pointer;background:#f1efe8;color:#1a1a18}
.abtn.ok{background:#1a1a18;color:#fff;border-color:#1a1a18}
.abtn.rech{background:#FCEBEB;border-color:#F09595;color:#791F1F}
.aprob-badge{display:none;background:#FCEBEB;color:#791F1F;font-size:10px;padding:1px 6px;border-radius:99px;margin-left:4px}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:100;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:1.25rem;width:100%;max-width:560px;border:1px solid #e0dfd8;margin:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.modal-title{font-size:14px;font-weight:500}
.modal-close{background:none;border:none;cursor:pointer;color:#5f5e5a;font-size:20px;line-height:1;padding:2px}
.modal-section{font-size:11px;font-weight:500;color:#5f5e5a;margin:12px 0 8px;text-transform:uppercase;letter-spacing:0.05em;border-top:1px solid #e0dfd8;padding-top:10px}
.mfg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mfl{display:flex;flex-direction:column;gap:4px}
.mfl.full{grid-column:1/-1}
.modal-actions{display:flex;gap:8px;margin-top:1rem;padding-top:10px;border-top:1px solid #e0dfd8;flex-wrap:wrap}
.modal-actions button{flex:1;padding:8px;font-size:12px;border-radius:8px;cursor:pointer;min-width:80px}
.btn-cancel{background:#f1efe8;border:1px solid #d3d1c7;color:#1a1a18}
.btn-delete{background:#FCEBEB;border:1px solid #F09595;color:#791F1F}
.btn-save{background:#1a1a18;color:#fff;border:none;font-weight:500}
.usd-wrap{position:relative}
.usd-wrap span{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:#5f5e5a;pointer-events:none}
.usd-wrap input{padding-left:26px}
.estado-btns{display:flex;gap:6px;flex-wrap:wrap}
.est-btn{padding:5px 10px;font-size:11px;border-radius:8px;border:1px solid #d3d1c7;cursor:pointer;background:#f1efe8;color:#5f5e5a}
.est-btn.on{background:#1a1a18;color:#fff;border-color:#1a1a18}
.spinner{display:inline-block;width:10px;height:10px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin 0.6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="header">
  <div>
    <h1><i class="ti ti-plant-2"></i> Gestión Operativa — Planta Biodiesel</h1>
    <p>Registro interdisciplinario · Escalonamiento 60% → 95% · 60 días</p>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <button onclick="sincronizarTodo()" style="padding:5px 12px;font-size:12px;border-radius:8px;border:1px solid #d3d1c7;cursor:pointer;background:#f1efe8;color:#1a1a18;display:flex;align-items:center;gap:5px"><i class="ti ti-cloud-upload"></i> Sincronizar todo</button>
    <label style="padding:5px 12px;font-size:12px;border-radius:8px;border:1px solid #d3d1c7;cursor:pointer;background:#f1efe8;color:#1a1a18;display:flex;align-items:center;gap:5px"><i class="ti ti-file-import"></i> Importar Excel<input type="file" id="import-file" accept=".xlsx" style="display:none" onchange="importarExcel(this)"></label>
    <div class="sync loading" id="sync-status"><span class="spinner"></span> Cargando...</div>
  </div>
</div>

<div class="nav">
  <button class="nb on" onclick="go('form',this)"><i class="ti ti-circle-plus"></i> Nuevo punto</button>
  <button class="nb" onclick="go('kanban',this)"><i class="ti ti-layout-kanban"></i> Kanban</button>
  <button class="nb" onclick="go('lista',this)"><i class="ti ti-list"></i> Lista</button>
  <button class="nb" onclick="go('aprob',this)"><i class="ti ti-shield-check"></i> Revisión <span class="aprob-badge" id="aprob-n">0</span></button>
</div>

<div id="v-form" class="view on">
  <div class="fg">
    <div class="fl"><label>Área operativa</label>
      <select id="f-area">
        <option value="">Seleccionar...</option>
        <optgroup label="Proceso">
          <option>Área 10 — Pretratamiento</option>
          <option>Área 20 — Transesterificación</option>
          <option>Área 31 — Lavado</option>
          <option>Área 32 — Secado</option>
          <option>Área 40 — Tratamiento de glicerina</option>
          <option>Área 50 — Rectificación de metanol</option>
        </optgroup>
        <optgroup label="Tankaje">
          <option>Área 60 — Ácido sulfúrico</option>
          <option>Área 61 — Aceite / glicerina / sebo</option>
          <option>Área 62 — Biodiesel</option>
          <option>Área 63 — Metanol / metilato</option>
          <option>Área 65 — Isla de carga</option>
        </optgroup>
        <optgroup label="Servicios">
          <option>Área 73 — Agua de enfriamiento</option>
          <option>Área 76 — Vapor</option>
          <option>Área 78 — Aire comprimido</option>
          <option>Área 79 — Fuel Oil / Gas Oil</option>
        </optgroup>
        <optgroup label="Soporte">
          <option>Pañol</option>
          <option>Laboratorio</option>
          <option>Organigrama</option>
          <option>Otros</option>
        </optgroup>
      </select>
    </div>
    <div class="fl"><label>Disciplina</label>
      <select id="f-disc">
        <option value="">Seleccionar...</option>
        <option>Procesos</option><option>Mantenimiento</option>
        <option>Calidad</option><option>Suministro</option>
        <option>SHYMA</option><option>Gerencia</option>
      </select>
    </div>
    <div class="fl"><label>Nombre / referencia</label><input type="text" id="f-autor" placeholder="Ej: Juan P."></div>
    <div class="fl"><label>Tipo</label>
      <select id="f-tipo">
        <option value="">Seleccionar...</option>
        <option>Restricción operativa</option>
        <option>Riesgo de calidad</option>
        <option>Falla / desvío de equipo</option>
        <option>Oportunidad de mejora</option>
        <option>Observación general</option>
      </select>
    </div>
    <div class="fl fg-full"><label>Descripción</label><textarea id="f-desc" placeholder="Describí la situación..."></textarea></div>
    <div class="fl fg-full"><label>Acción propuesta (opcional)</label><input type="text" id="f-accion" placeholder="Ej: Revisar capacidad de bomba B-201"></div>
    <div class="fl"><label>Tiempo de ejecución estimado</label><input type="text" id="f-tiempo" placeholder="Ej: 3 días, 2 semanas"></div>
    <div class="fl"><label>Costo estimado</label>
      <div class="usd-wrap"><span>USD</span><input type="number" id="f-costo" placeholder="0" min="0" step="100"></div>
    </div>
    <div class="fl fg-full"><label>Semáforo de riesgo</label>
      <div class="sem" id="sem-form">
        <button class="sb r" onclick="setSem(this,'r')">🔴 Alto — Paro de planta</button>
        <button class="sb a" onclick="setSem(this,'a')">🟡 Medio — Afecta utilización</button>
        <button class="sb v" onclick="setSem(this,'v')">🟢 Bajo — Mejora / Optimiza</button>
      </div>
    </div>
  </div>
  <button class="save-btn" id="save-btn" onclick="guardar()">Guardar punto</button>
  <p class="msg" id="f-msg"></p>
</div>

<div id="v-kanban" class="view">
  <div class="kstats" id="k-stats"></div>
  <div class="kanban" id="k-board"></div>
</div>

<div id="v-lista" class="view">
  <div class="frow">
    <select id="fil-area" onchange="renderLista()"><option value="">Todas las áreas</option></select>
    <select id="fil-sem" onchange="renderLista()">
      <option value="">Todo semáforo</option>
      <option value="r">🔴 Alto</option>
      <option value="a">🟡 Medio</option>
      <option value="v">🟢 Bajo</option>
    </select>
    <select id="fil-est" onchange="renderLista()">
      <option value="">Todo estado</option>
      <option value="pendiente">Pendiente</option>
      <option value="aprobado">Aprobado</option>
      <option value="rechazado">Rechazado</option>
      <option value="en_estudio">En estudio</option>
      <option value="capex">Capex</option>
      <option value="ejecutando">Ejecutando</option>
      <option value="implementado">Implementado</option>
    </select>
    <select id="fil-dl" onchange="renderLista()">

      <option value="vencido">Vencido</option>

      <option value="ok">Sin vencer</option>
      <option value="sin">Sin deadline</option>
    </select>
    <button class="exp-btn" onclick="exportar()"><i class="ti ti-download"></i> Excel</button>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th style="width:95px">Área</th><th style="width:62px">Riesgo</th>
        <th style="width:90px">Estado</th><th>Descripción</th>
        <th style="width:80px">Responsable</th><th style="width:74px">Deadline</th>
        <th style="width:68px">Tiempo</th><th style="width:72px">Costo</th><th style="width:44px"></th>
      </tr></thead>
      <tbody id="tbl-body"></tbody>
    </table>
  </div>
  <div id="lista-empty" class="empty" style="display:none"><i class="ti ti-clipboard" style="font-size:28px;display:block;margin-bottom:8px"></i>Sin puntos con esos filtros.</div>
</div>

<div id="v-aprob" class="view"><div id="aprob-list"></div></div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">

      <button class="modal-close" onclick="closeModal()">&#x2715;</button>

      <div class="mfl"><label>Área operativa</label>
        <select id="m-area">
          <optgroup label="Proceso">
            <option>Área 10 — Pretratamiento</option><option>Área 20 — Transesterificación</option>

          </optgroup>
        </select>
      </div>
      <div class="mfl"><label>Disciplina</label>
        <select id="m-disc">
          <option>Procesos</option><option>Mantenimiento</option><option>Calidad</option>
          <option>Suministro</option><option>SHYMA</option><option>Gerencia</option>
        </select>
      </div>
      <div class="mfl"><label>Nombre / referencia</label><input type="text" id="m-autor"></div>
      <div class="mfl"><label>Tipo</label>
        <select id="m-tipo">
          <option>Restricción operativa</option><option>Riesgo de calidad</option>
          <option>Falla / desvío de equipo</option><option>Oportunidad de mejora</option><option>Observación general</option>
        </select>
      </div>
      <div class="mfl full"><label>Descripción</label><textarea id="m-desc" style="min-height:80px"></textarea></div>
      <div class="mfl full"><label>Acción propuesta</label><input type="text" id="m-accion"></div>

async function sbFetch(path, options = {}) {
  const res = await fetch(SUPABASE_URL + path, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,

const ESTADOS = {
  label:{pendiente:'Pendiente',aprobado:'Aprobado',rechazado:'Rechazado',en_estudio:'En estudio',capex:'Capex',ejecutando:'Ejecutando',implementado:'Implementado'},
  badge:{pendiente:'bg',aprobado:'bb',rechazado:'br',en_estudio:'bp',capex:'ba',ejecutando:'bb',implementado:'bv'}
};
const AREAS = ['Área 10 — Pretratamiento','Área 20 — Transesterificación','Área 31 — Lavado','Área 32 — Secado','Área 40 — Tratamiento de glicerina','Área 50 — Rectificación de metanol','Área 60 — Ácido sulfúrico','Área 61 — Aceite / glicerina / sebo','Área 62 — Biodiesel','Área 63 — Metanol / metilato','Área 65 — Isla de carga','Área 73 — Agua de enfriamiento','Área 76 — Vapor','Área 78 — Aire comprimido','Área 79 — Fuel Oil / Gas Oil','Pañol','Laboratorio','Organigrama','Otros'];

function setSyncStatus(s, t) {
  const el = document.getElementById('sync-status');
  el.className = 'sync ' + s;
  el.innerHTML = s === 'loading' ? `<span class="spinner"></span> ${t}` : `<i class="ti ti-${s==='ok'?'cloud-check':'cloud-x'}"></i> ${t}`;
}

function guardarLocal() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(puntos));
}

async function guardarSupabase(p) {
  try {
    await sbFetch('/rest/v1/puntos', {
      method: 'POST',
      body: JSON.stringify({
        id_local: String(p.id),
        area: p.area, disc: p.disc, autor: p.autor, tipo: p.tipo,
        descripcion: p.desc, accion: p.accion, tiempo: p.tiempo,
        costo: p.costo, sem: p.sem, estado: p.estado,
        responsable: p.responsable, deadline: p.deadline, fecha: p.fecha
      })
    });
  } catch(e) {
    console.error('Error guardando en Supabase:', e);
  }
}

async function actualizarSupabase(p) {
  try {
    await sbFetch('/rest/v1/puntos?id_local=eq.' + p.id, {
      method: 'PATCH',
      body: JSON.stringify({
        area: p.area, disc: p.disc, autor: p.autor, tipo: p.tipo,
        descripcion: p.desc, accion: p.accion, tiempo: p.tiempo,
        costo: p.costo, sem: p.sem, estado: p.estado,
        responsable: p.responsable, deadline: p.deadline, fecha: p.fecha
      })
    });
  } catch(e) {
    console.error('Error actualizando en Supabase:', e);
  }
}

async function eliminarSupabase(id) {
  try {
    await sbFetch('/rest/v1/puntos?id_local=eq.' + id, { method: 'DELETE' });
  } catch(e) {
    console.error('Error eliminando en Supabase:', e);
  }
}

async function sincronizarTodo() {
  if(!puntos.length){alert('No hay puntos para sincronizar.');return;}
  setSyncStatus('loading', 'Sincronizando...');
  try {
    // Primero borrar todo lo que hay en Supabase
    await sbFetch('/rest/v1/puntos?id_local=neq.null', { method: 'DELETE' });
    // Insertar todos los puntos locales
    const rows = puntos.map(p => ({
      id_local: String(p.id),
      area: p.area, disc: p.disc, autor: p.autor, tipo: p.tipo,
      descripcion: p.desc, accion: p.accion||'', tiempo: p.tiempo||'',
      costo: p.costo, sem: p.sem, estado: p.estado,
      responsable: p.responsable||'', deadline: p.deadline||'', fecha: p.fecha||''
    }));
    await sbFetch('/rest/v1/puntos', {
      method: 'POST',
      body: JSON.stringify(rows)
    });
    setSyncStatus('ok', `${puntos.length} puntos sincronizados`);
    setTimeout(()=>setSyncStatus('ok','Listo'), 3000);
  } catch(e) {
    setSyncStatus('err', 'Error: ' + e.message);
    console.error(e);
  }
}

// Inicializar
setSyncStatus('ok', 'Listo');
updBadge();

function go(v, el) {
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('v-'+v).classList.add('on');
  if(v==='kanban') renderKanban();
  if(v==='lista'){fillAreaFilter();renderLista();}
  if(v==='aprob') renderAprob();
}

function setSem(btn, val) {
  document.querySelectorAll('#sem-form .sb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); semSel = val;
}
function setMSem(btn, val) {
  ['ms-r','ms-a','ms-v'].forEach(id=>document.getElementById(id).classList.remove('on'));
  btn.classList.add('on'); mSemSel = val;
}
function setEst(btn) {
  document.querySelectorAll('.est-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); mEstSel = btn.dataset.est;
}

function guardar() {
  const area = document.getElementById('f-area').value;
  const disc = document.getElementById('f-disc').value;
  const autor = document.getElementById('f-autor').value.trim() || '—';
  const tipo = document.getElementById('f-tipo').value;
  const desc = document.getElementById('f-desc').value.trim();
  const accion = document.getElementById('f-accion').value.trim();
  const tiempo = document.getElementById('f-tiempo').value.trim();
  const costoVal = document.getElementById('f-costo').value;
  const costo = costoVal ? parseFloat(costoVal) : null;
  const msg = document.getElementById('f-msg');

  if(!area || !disc || !tipo || !desc || !semSel) {
    msg.style.color='#A32D2D';
    msg.textContent='Completá área, disciplina, tipo, descripción y semáforo.';
    return;
  }

  const fecha = new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'2-digit'});
  const nuevo = {id: Date.now(), area, disc, autor, tipo, desc, accion, tiempo, costo, sem: semSel, estado: 'pendiente', responsable: '', deadline: '', fecha};
  puntos.push(nuevo);
  guardarLocal();
  guardarSupabase(nuevo);

  ['f-area','f-disc','f-autor','f-tipo','f-desc','f-accion','f-tiempo','f-costo'].forEach(id=>document.getElementById(id).value='');
  document.querySelectorAll('#sem-form .sb').forEach(b=>b.classList.remove('on'));
  semSel = '';
  msg.style.color='#3B6D11';
  msg.textContent='Punto guardado.';
  setTimeout(()=>msg.textContent='', 3000);
  updBadge();
}

function updBadge() {
  const n = puntos.filter(p=>p.estado==='pendiente').length;
  const b = document.getElementById('aprob-n');
  b.textContent = n; b.style.display = n > 0 ? 'inline' : 'none';
}

function semBadge(s) {
  if(s==='r') return '<span class="badge br">🔴 Alto</span>';
  if(s==='a') return '<span class="badge ba">🟡 Medio</span>';
  return '<span class="badge bv">🟢 Bajo</span>';
}
function fmtUSD(v){return(v==null||v==='')? '—':'USD '+Number(v).toLocaleString('es-AR');}
function dlHtml(dl){
  if(!dl) return '—';
  const t=new Date(); t.setHours(0,0,0,0);
  const d=new Date(dl+'T00:00:00');
  const diff=Math.round((d-t)/864e5);
  const fmt=d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'});
  if(diff<0) return `<span style="color:#A32D2D;font-weight:500">Venc. ${fmt}</span>`;
  if(diff<=3) return `<span style="color:#854F0B;font-weight:500">${fmt} (${diff}d)</span>`;
  return `<span style="color:#3B6D11">${fmt}</span>`;
}

function openModal(id) {
  const p = puntos.find(p=>p.id===id);
  if(!p) return;
  modalId = id;
  document.getElementById('m-title').textContent = p.area.split('—')[0].trim()+' — '+p.tipo;
  document.getElementById('m-area').value = p.area;
  document.getElementById('m-disc').value = p.disc;
  document.getElementById('m-autor').value = p.autor==='—'?'':p.autor;
  document.getElementById('m-tipo').value = p.tipo;
  document.getElementById('m-desc').value = p.desc;
  document.getElementById('m-accion').value = p.accion||'';
  document.getElementById('m-tiempo').value = p.tiempo||'';
  document.getElementById('m-costo').value = p.costo||'';
  document.getElementById('m-resp').value = p.responsable||'';
  document.getElementById('m-dl').value = p.deadline||'';
  ['ms-r','ms-a','ms-v'].forEach(id=>document.getElementById(id).classList.remove('on'));
  document.getElementById('ms-'+(p.sem||'v')).classList.add('on'); mSemSel = p.sem||'v';
  document.querySelectorAll('.est-btn').forEach(b=>{b.classList.remove('on');if(b.dataset.est===p.estado)b.classList.add('on');});
  mEstSel = p.estado;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); modalId=null; }

function guardarEdicion() {
  if(!modalId) return;
  const c = document.getElementById('m-costo').value;
  const p = puntos.find(p=>p.id===modalId);
  if(!p) return;
  p.area = document.getElementById('m-area').value;
  p.disc = document.getElementById('m-disc').value;
  p.autor = document.getElementById('m-autor').value.trim()||'—';
  p.tipo = document.getElementById('m-tipo').value;
  p.desc = document.getElementById('m-desc').value.trim();
  p.accion = document.getElementById('m-accion').value.trim();
  p.tiempo = document.getElementById('m-tiempo').value.trim();
  p.costo = c?parseFloat(c):null;
  p.sem = mSemSel;
  p.estado = mEstSel;
  p.responsable = document.getElementById('m-resp').value.trim();
  p.deadline = document.getElementById('m-dl').value;
  guardarLocal();
  actualizarSupabase(p);
  closeModal();
  updBadge();
  const a = document.querySelector('.nb.on');
  if(a.textContent.includes('Kanban')) renderKanban();
  else if(a.textContent.includes('Lista')) renderLista();
  else if(a.textContent.includes('Revisión')) renderAprob();
}

function eliminarPunto() {
  if(!confirm('¿Eliminar este punto definitivamente?')) return;
  eliminarSupabase(modalId);
  puntos = puntos.filter(p=>p.id!==modalId);
  guardarLocal();
  closeModal();
  updBadge();
  const a = document.querySelector('.nb.on');
  if(a.textContent.includes('Kanban')) renderKanban();
  else if(a.textContent.includes('Lista')) renderLista();
  else if(a.textContent.includes('Revisión')) renderAprob();
}

function renderKanban() {
  const estados = ['pendiente','aprobado','rechazado','en_estudio','capex','ejecutando','implementado'];
  const costoTotal = puntos.reduce((s,p)=>s+(p.costo||0),0);
  document.getElementById('k-stats').innerHTML=`
    <div class="ksc"><div class="ksl">Total</div><div class="ksv">${puntos.length}</div></div>
    <div class="ksc"><div class="ksl">🔴 Alto riesgo</div><div class="ksv" style="color:#A32D2D">${puntos.filter(p=>p.sem==='r').length}</div></div>
    <div class="ksc"><div class="ksl">Ejecutando</div><div class="ksv" style="color:#0C447C">${puntos.filter(p=>p.estado==='ejecutando').length}</div></div>
    <div class="ksc"><div class="ksl">Costo estimado</div><div class="ksv" style="font-size:15px;color:#3B6D11">USD ${costoTotal.toLocaleString('es-AR')}</div></div>`;
  document.getElementById('k-board').innerHTML=estados.map(est=>{
    const pts=puntos.filter(p=>p.estado===est);
    return `<div class="kcol">
      <div class="kctitle">${ESTADOS.label[est]}<span class="kccnt">${pts.length}</span></div>
      ${pts.length===0?'<div style="font-size:11px;color:#888780;text-align:center;padding:10px 0">Sin puntos</div>':''}
      ${pts.map(p=>`<div class="kcard" onclick="openModal(${p.id})">
        <div class="kcard-area">${p.area.split('—')[0].trim()} · ${p.disc}</div>
        <div class="kcard-desc">${p.desc}</div>
        <div class="kcard-tags">${semBadge(p.sem)}${p.tiempo?`<span class="badge bg">${p.tiempo}</span>`:''}${p.costo?`<span class="badge bg">USD ${Number(p.costo).toLocaleString('es-AR')}</span>`:''}<span class="kcard-edit"><i class="ti ti-pencil" style="font-size:11px"></i></span></div>
      </div>`).join('')}
    </div>`;
  }).join('');
}

function fillAreaFilter() {
  const sel=document.getElementById('fil-area');
  const cur=sel.value;
  sel.innerHTML='<option value="">Todas las áreas</option>'+AREAS.map(a=>`<option value="${a}">${a}</option>`).join('');
  sel.value=cur;
}

function renderLista() {
  const fa=document.getElementById('fil-area').value;
  const fs=document.getElementById('fil-sem').value;
  const fe=document.getElementById('fil-est').value;
  const fd=document.getElementById('fil-dl').value;
  const today=new Date(); today.setHours(0,0,0,0);
  let pts=puntos.filter(p=>{
    if(fa&&p.area!==fa) return false;
    if(fs&&p.sem!==fs) return false;
    if(fe&&p.estado!==fe) return false;
    if(fd){
      if(fd==='sin') return !p.deadline;
      if(!p.deadline) return false;
      const diff=Math.round((new Date(p.deadline+'T00:00:00')-today)/864e5);
      if(fd==='vencido') return diff<0;
      if(fd==='proximo') return diff>=0&&diff<=3;
      if(fd==='ok') return diff>3;
    }
    return true;
  });
  const tbody=document.getElementById('tbl-body');
  const empty=document.getElementById('lista-empty');
  if(pts.length===0){tbody.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  tbody.innerHTML=pts.map(p=>`<tr>
    <td style="font-size:11px">${p.area.split('—')[0].trim()}</td>
    <td>${semBadge(p.sem)}</td>
    <td><span class="badge ${ESTADOS.badge[p.estado]}">${ESTADOS.label[p.estado]}</span></td>
    <td style="white-space:normal;font-size:12px">${p.desc}${p.accion?`<div style="font-size:11px;color:#5f5e5a;font-style:italic;margin-top:2px">→ ${p.accion}</div>`:''}</td>
    <td style="font-size:11px">${p.responsable||'—'}</td>
    <td style="font-size:11px">${p.deadline?dlHtml(p.deadline):'—'}</td>
    <td style="font-size:11px">${p.tiempo||'—'}</td>
    <td style="font-size:11px">${fmtUSD(p.costo)}</td>
    <td><button class="tbl-edit" onclick="openModal(${p.id})"><i class="ti ti-pencil" style="font-size:11px"></i></button></td>
  </tr>`).join('');
}

function renderAprob() {
  const pts=puntos.filter(p=>p.estado==='pendiente');
  const con=document.getElementById('aprob-list');
  if(pts.length===0){con.innerHTML='<div class="empty"><i class="ti ti-circle-check" style="font-size:28px;display:block;margin-bottom:8px"></i>Sin puntos pendientes de revisión.</div>';return;}
  con.innerHTML=pts.map(p=>`<div class="acard">
    <div class="acard-meta">
      <span class="badge bg">${p.area}</span><span class="badge bb">${p.disc}</span>
      ${semBadge(p.sem)}<span class="badge bg">${p.tipo}</span>
      <span style="font-size:11px;color:#5f5e5a">${p.autor} · ${p.fecha}</span>
      ${p.tiempo?`<span class="badge bg">⏱ ${p.tiempo}</span>`:''}
      ${p.costo?`<span class="badge bg">USD ${Number(p.costo).toLocaleString('es-AR')}</span>`:''}
    </div>
    <div class="acard-desc">${p.desc}</div>
    ${p.accion?`<div class="acard-accion">→ ${p.accion}</div>`:''}
    <div class="abtns">
      <button class="abtn ok" onclick="cambiarEstado(${p.id},'aprobado')">✓ Aprobar</button>
      <button class="abtn rech" onclick="cambiarEstado(${p.id},'rechazado')">✗ Rechazar</button>
      <button class="abtn" onclick="openModal(${p.id})"><i class="ti ti-pencil" style="font-size:11px"></i> Editar</button>
    </div>
  </div>`).join('');
}

function cambiarEstado(id, estado) {
  const p = puntos.find(p=>p.id===id);
  if(p){
    p.estado = estado;
    guardarLocal();
    actualizarSupabase(p);
    updBadge();
    renderAprob();
  }
}

function importarExcel(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, {type:'binary'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws);
      const semMap = {'Crítico':'r','A atender':'a','Controlado':'v','Alto — Paro de planta':'r','Medio — Afecta utilización':'a','Bajo — Mejora / Optimiza':'v'};
      const estMap = {'Pendiente':'pendiente','Aprobado':'aprobado','Rechazado':'rechazado','En estudio':'en_estudio','Capex':'capex','Ejecutando':'ejecutando','Implementado':'implementado'};
      let importados = 0;
      rows.forEach(r => {
        if(!r['Descripción']) return;
        puntos.push({
          id: Date.now() + Math.random(),
          area: r['Área']||'',
          disc: r['Disciplina']||'',
          autor: r['Autor']||'—',
          tipo: r['Tipo']||'Observación general',
          desc: r['Descripción']||'',
          accion: r['Acción propuesta']||'',
          tiempo: r['Tiempo estimado']||'',
          costo: r['Costo USD']?parseFloat(r['Costo USD']):null,
          sem: semMap[r['Semáforo']]||'v',
          estado: estMap[r['Estado']]||'pendiente',
          responsable: r['Responsable']||'',
          deadline: r['Deadline']||'',
          fecha: r['Fecha']||new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'2-digit'})
        });
        importados++;
      });
      guardarLocal();
      updBadge();
      alert(importados + ' puntos importados correctamente.');
      input.value = '';
      const a = document.querySelector('.nb.on');
      if(a.textContent.includes('Kanban')) renderKanban();
      else if(a.textContent.includes('Lista')) renderLista();
    } catch(err) {
      alert('Error al importar: ' + err.message);
    }
  };
  reader.readAsBinaryString(file);
}

function exportar() {
  if(!puntos.length){alert('No hay puntos para exportar.');return;}
  const semLabel=s=>s==='r'?'Alto — Paro de planta':s==='a'?'Medio — Afecta utilización':'Bajo — Mejora / Optimiza';
  const rows=puntos.map(p=>({'Área':p.area,'Disciplina':p.disc,'Autor':p.autor,'Tipo':p.tipo,'Descripción':p.desc,'Acción propuesta':p.accion||'','Tiempo estimado':p.tiempo||'','Costo USD':p.costo||'','Semáforo':semLabel(p.sem),'Estado':ESTADOS.label[p.estado],'Responsable':p.responsable||'','Deadline':p.deadline||'','Fecha':p.fecha}));
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[{wch:28},{wch:16},{wch:14},{wch:22},{wch:50},{wch:40},{wch:18},{wch:14},{wch:25},{wch:15},{wch:18},{wch:12},{wch:12}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Puntos');
  XLSX.writeFile(wb,`gestion_operativa_${new Date().toLocaleDateString('es-AR').replace(/\//g,'-')}.xlsx`);
}
